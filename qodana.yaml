version: "1.0"
linter: jetbrains/qodana-cdnet:2025.3-eap
profile:
  name: qodana.recommended

dotnet:
  solution: DigitallPower.sln

include:
  - name: CheckDependencyLicenses

exclude:
  - name: All
    paths:
      - tests/dgt.power.codegeneration.tests/Resources
      - README.md
  - name: HeapView.DelegateAllocation
  - name: HeapView.ObjectAllocation
